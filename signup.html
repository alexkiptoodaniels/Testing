<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — StockEase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand">
      <span class="brand-mark">SE</span>
      StockEase
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="inventory.html" class="nav-link" data-auth="in">Inventory</a>
      <a href="profile.html" class="nav-link" data-auth="in">Profile</a>
      <a href="signup.html" class="nav-link" data-auth="out">Sign Up</a>
    </div>
    <div class="nav-actions">
      <span id="nav-user-name" class="mono" data-auth="in" style="font-size:0.85rem;color:var(--ink-soft);"></span>
      <a href="login.html" id="nav-auth-btn" class="btn btn-primary btn-sm">Login</a>
    </div>
  </div>
</nav>

<main>
  <div class="auth-wrap">
    <div class="auth-card">
      <span class="brand-mark">SE</span>
      <h1>Create Account</h1>
      <p class="auth-sub">Start your inventory ledger in under a minute.</p>

      <div id="form-msg" class="form-msg"></div>

      <form id="signup-form" novalidate>
        <div class="field">
          <label for="signup-name">Full name</label>
          <input type="text" id="signup-name" name="name" placeholder="Jane Doe" required autocomplete="name">
        </div>
        <div class="field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" placeholder="you@company.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" placeholder="••••••••" required autocomplete="new-password">
          <p class="field-hint">At least 6 characters.</p>
        </div>
        <div class="field">
          <label for="signup-confirm">Confirm password</label>
          <input type="password" id="signup-confirm" name="confirm" placeholder="••••••••" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-amber btn-block">Create Account</button>
      </form>

      <p class="auth-foot">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <p class="footer-note">STOCKEASE — INVENTORY LEDGER, SIMPLIFIED</p>
    <p class="footer-note">&copy; 2026 StockEase</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="script.js"></script>
</body>
</html>
